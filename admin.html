<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Catálogos La Factoría</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #f5f5f5;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #7A9A01 0%, #4A2C17 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }

        .login-box h1 {
            color: #4A2C17;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .login-box p {
            color: #888;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1.1em;
            box-sizing: border-box;
        }

        .login-box input:focus {
            outline: none;
            border-color: #7A9A01;
            box-shadow: 0 0 5px rgba(122, 154, 1, 0.3);
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: #7A9A01;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-box button:hover {
            background: #4A2C17;
        }

        .login-error {
            color: #c62828;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .admin-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: #4A2C17;
            margin: 0;
        }

        .logout-btn {
            background: #c62828;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #b71c1c;
        }

        .admin-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .admin-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .panel-title {
            color: #7A9A01;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 3px solid #7A9A01;
            padding-bottom: 10px;
        }

        .familia-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #C8BA8B;
        }

        .familia-item.inactive {
            opacity: 0.6;
        }

        .familia-name {
            font-weight: 600;
            color: #4A2C17;
        }

        .toggle-btn {
            background: #7A9A01;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .toggle-btn.inactive {
            background: #ccc;
        }

        .toggle-btn:hover {
            opacity: 0.9;
        }

        .catalog-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border-left: 5px solid #7A9A01;
        }

        .catalog-item.inactive {
            opacity: 0.5;
            border-left-color: #ccc;
        }

        .catalog-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .catalog-item-name {
            font-weight: 600;
            color: #4A2C17;
            font-size: 1.1em;
        }

        .catalog-item-meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .catalog-item-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
        }

        .toggle-catalog-btn {
            background: #7A9A01;
            color: white;
        }

        .toggle-catalog-btn.inactive {
            background: #ccc;
        }

        .delete-btn {
            background: #c62828;
            color: white;
        }

        .delete-btn:hover {
            background: #b71c1c;
        }

        .add-btn {
            background: #4CAF50;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-top: 10px;
        }

        .add-btn:hover {
            background: #45a049;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        .backup-btn {
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
        }

        .backup-btn:hover {
            background: #0b7dda;
        }

        .stats {
            background: #E8F4E1;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 5px solid #7A9A01;
        }

        .stats-item {
            padding: 5px 0;
            color: #555;
        }

        .stats-value {
            font-weight: 600;
            color: #4A2C17;
        }

        @media (max-width: 1024px) {
            .admin-content {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Panel Admin</h1>
            <p>Gestión de Catálogos - La Factoría</p>
            <div id="loginError" class="login-error hidden"></div>
            <input type="password" id="passwordInput" placeholder="Ingresa la contraseña" autocomplete="off">
            <button onclick="verificarPassword()">Acceder</button>
        </div>
    </div>

    <!-- PANEL ADMIN (oculto hasta login) -->
    <div id="adminScreen" class="hidden">
        <div class="admin-container">
            <div class="admin-header">
                <h1>⚙️ Panel de Administración</h1>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </div>

            <div class="admin-content">
                <!-- PANEL IZQUIERDO: FAMILIAS -->
                <div class="admin-panel">
                    <h2 class="panel-title">📂 Familias</h2>
                    <div id="familiasContainer"></div>

                    <button class="add-btn" onclick="agregarFamilia()" style="margin-top: 15px;">➕ Agregar Nueva Familia</button>

                    <div class="stats">
                        <div class="stats-item">
                            <span>Total de familias:</span>
                            <span class="stats-value" id="totalFamilias">0</span>
                        </div>
                        <div class="stats-item">
                            <span>Familias activas:</span>
                            <span class="stats-value" id="familiasActivas">0</span>
                        </div>
                        <div class="stats-item">
                            <span>Total de catálogos:</span>
                            <span class="stats-value" id="totalCatalogos">0</span>
                        </div>
                        <div class="stats-item">
                            <span>Catálogos activos:</span>
                            <span class="stats-value" id="catalogosActivos">0</span>
                        </div>
                    </div>

                    <button class="backup-btn" onclick="descargarBackup()">📥 Descargar Backup (JSON)</button>
                </div>

                <!-- PANEL DERECHO: CATÁLOGOS -->
                <div class="admin-panel">
                    <h2 class="panel-title">📚 Catálogos</h2>

                    <div class="filters">
                        <select id="familiaFilter" class="filter-select" onchange="filtrarCatalogos()">
                            <option value="todas">Todas las familias</option>
                        </select>
                        <select id="estadoFilter" class="filter-select" onchange="filtrarCatalogos()">
                            <option value="todos">Todos los estados</option>
                            <option value="activos">Solo activos</option>
                            <option value="inactivos">Solo inactivos</option>
                        </select>
                    </div>

                    <div id="catalogosContainer"></div>

                    <button class="add-btn" onclick="agregarCatalogo()">➕ Agregar Nuevo Catálogo</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "7557";
        let datosGlobales = {};

        // Verificar contraseña
        function verificarPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminScreen').classList.remove('hidden');
                cargarDatos();
            } else {
                document.getElementById('loginError').textContent = '❌ Contraseña incorrecta';
                document.getElementById('loginError').classList.remove('hidden');
                document.getElementById('passwordInput').value = '';
                setTimeout(() => {
                    document.getElementById('loginError').classList.add('hidden');
                }, 3000);
            }
        }

        // Cerrar sesión
        function logout() {
            document.getElementById('adminScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
        }

        // Permitir enter para login
        document.getElementById('passwordInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verificarPassword();
        });

        // Cargar datos del JSON
        async function cargarDatos() {
            try {
                const response = await fetch('data/catalogos.json');
                datosGlobales = await response.json();
                renderizarFamilias();
                renderizarCatalogos();
                actualizarStats();
            } catch (error) {
                alert('Error al cargar datos: ' + error.message);
            }
        }

        // Renderizar familias
        function renderizarFamilias() {
            const container = document.getElementById('familiasContainer');
            container.innerHTML = '';

            datosGlobales.familias.forEach(familia => {
                const catalogosFamilia = datosGlobales.catalogos.filter(c => c.familiaId === familia.id).length;
                const div = document.createElement('div');
                div.className = `familia-item ${!familia.activo ? 'inactive' : ''}`;
                div.innerHTML = `
                    <div>
                        <div class="familia-name">${familia.emoji} ${familia.nombre}</div>
                        <small style="color: #888;">${familia.descripcionFamilia}</small>
                        <small style="color: #7A9A01; font-weight: 600;">📚 ${catalogosFamilia} catálogos</small>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="action-btn toggle-btn ${!familia.activo ? 'inactive' : ''}" 
                                onclick="toggleFamilia(${familia.id})"
                                style="padding: 6px 12px; font-size: 0.85em;">
                            ${familia.activo ? '✓' : '✗'}
                        </button>
                        <button class="action-btn" 
                                style="background: #2196F3; color: white; padding: 6px 12px; font-size: 0.85em;"
                                onclick="editarFamilia(${familia.id})">
                            ✏️ Editar
                        </button>
                        <button class="action-btn delete-btn" 
                                style="padding: 6px 12px; font-size: 0.85em;"
                                onclick="eliminarFamilia(${familia.id})">
                            🗑️
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });

            // Actualizar filtro de familias
            const select = document.getElementById('familiaFilter');
            select.innerHTML = '<option value="todas">Todas las familias</option>';
            datosGlobales.familias.forEach(familia => {
                const option = document.createElement('option');
                option.value = familia.id;
                option.textContent = `${familia.emoji} ${familia.nombre}`;
                select.appendChild(option);
            });
        }

        // Toggle familia
        function toggleFamilia(id) {
            const familia = datosGlobales.familias.find(f => f.id === id);
            if (familia) {
                familia.activo = !familia.activo;
                renderizarFamilias();
                renderizarCatalogos();
                actualizarStats();
            }
        }

        // Editar familia
        function editarFamilia(id) {
            const familia = datosGlobales.familias.find(f => f.id === id);
            if (!familia) return;

            const nuevoNombre = prompt('Nombre de la familia:', familia.nombre);
            if (!nuevoNombre) return;

            const nuevoEmoji = prompt('Emoji (ej: 🛏️):', familia.emoji);
            if (!nuevoEmoji) return;

            const nuevaDescripcion = prompt('Descripción:', familia.descripcionFamilia);
            if (nuevaDescripcion === null) return;

            familia.nombre = nuevoNombre;
            familia.emoji = nuevoEmoji;
            familia.descripcionFamilia = nuevaDescripcion;

            renderizarFamilias();
            renderizarCatalogos();
            alert('✓ Familia actualizada');
        }

        // Eliminar familia
        function eliminarFamilia(id) {
            const familia = datosGlobales.familias.find(f => f.id === id);
            if (!familia) return;

            const catalogosAsociados = datosGlobales.catalogos.filter(c => c.familiaId === id).length;

            if (catalogosAsociados > 0) {
                alert(`❌ No puedes eliminar esta familia.\nTiene ${catalogosAsociados} catálogos asociados.\n\nPrimero elimina los catálogos.`);
                return;
            }

            if (confirm(`¿Estás seguro de eliminar la familia "${familia.nombre}"?`)) {
                datosGlobales.familias = datosGlobales.familias.filter(f => f.id !== id);
                renderizarFamilias();
                renderizarCatalogos();
                actualizarStats();
                alert('✓ Familia eliminada');
            }
        }

        // Agregar nueva familia
        function agregarFamilia() {
            const nombre = prompt('Nombre de la nueva familia:');
            if (!nombre) return;

            const emoji = prompt('Emoji (ej: 🛋️, 🪑, 💎):', '📦');
            if (emoji === null) return;

            const descripcion = prompt('Descripción:', '');
            if (descripcion === null) return;

            const nuevoId = Math.max(...datosGlobales.familias.map(f => f.id), 0) + 1;

            datosGlobales.familias.push({
                id: nuevoId,
                nombre: nombre,
                emoji: emoji,
                descripcionFamilia: descripcion,
                activo: true
            });

            renderizarFamilias();
            actualizarStats();
            alert('✓ Familia creada exitosamente');
        }

        // Renderizar catálogos
        function renderizarCatalogos() {
            const container = document.getElementById('catalogosContainer');
            const filtroFamilia = document.getElementById('familiaFilter').value;
            const filtroEstado = document.getElementById('estadoFilter').value;

            let catalogos = datosGlobales.catalogos;

            // Filtrar por familia
            if (filtroFamilia !== 'todas') {
                catalogos = catalogos.filter(c => c.familiaId == filtroFamilia);
            }

            // Filtrar por estado
            if (filtroEstado === 'activos') {
                catalogos = catalogos.filter(c => c.activo);
            } else if (filtroEstado === 'inactivos') {
                catalogos = catalogos.filter(c => !c.activo);
            }

            container.innerHTML = '';

            if (catalogos.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center;">No hay catálogos</p>';
                return;
            }

            catalogos.forEach(catalogo => {
                const familia = datosGlobales.familias.find(f => f.id === catalogo.familiaId);
                const div = document.createElement('div');
                div.className = `catalog-item ${!catalogo.activo ? 'inactive' : ''}`;
                div.innerHTML = `
                    <div class="catalog-item-header">
                        <div class="catalog-item-name">${familia.emoji} ${catalogo.nombre}</div>
                        <div class="catalog-item-actions">
                            <button class="action-btn toggle-catalog-btn ${!catalogo.activo ? 'inactive' : ''}" 
                                    onclick="toggleCatalogo(${catalogo.id})">
                                ${catalogo.activo ? '✓ Activo' : '✗ Inactivo'}
                            </button>
                            <button class="action-btn delete-btn" onclick="eliminarCatalogo(${catalogo.id})">🗑️ Eliminar</button>
                        </div>
                    </div>
                    <div class="catalog-item-meta">
                        <strong>Proveedor:</strong> ${catalogo.proveedor}<br>
                        <strong>PDF:</strong> ${catalogo.pdf}
                    </div>
                    <div class="catalog-item-meta">
                        ${catalogo.descripcion}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Toggle catálogo
        function toggleCatalogo(id) {
            const catalogo = datosGlobales.catalogos.find(c => c.id === id);
            if (catalogo) {
                catalogo.activo = !catalogo.activo;
                renderizarCatalogos();
                actualizarStats();
            }
        }

        // Eliminar catálogo
        function eliminarCatalogo(id) {
            if (confirm('¿Estás seguro de que quieres eliminar este catálogo?')) {
                datosGlobales.catalogos = datosGlobales.catalogos.filter(c => c.id !== id);
                renderizarCatalogos();
                actualizarStats();
            }
        }

        // Agregar catálogo
        function agregarCatalogo() {
            const nombre = prompt('Nombre del catálogo:');
            if (!nombre) return;

            const familia = prompt('ID de la familia (1-9):');
            if (!familia) return;

            const proveedor = prompt('Proveedor:');
            if (!proveedor) return;

            const pdf = prompt('Ruta del PDF (ej: catalogos/Dormitorios/archivo.pdf):');
            if (!pdf) return;

            const nuevoId = Math.max(...datosGlobales.catalogos.map(c => c.id), 0) + 1;

            datosGlobales.catalogos.push({
                id: nuevoId,
                familiaId: parseInt(familia),
                nombre: nombre,
                descripcion: prompt('Descripción:') || '',
                proveedor: proveedor,
                pdf: pdf,
                imagen: prompt('Imagen (opcional):') || '',
                activo: true,
                orden: datosGlobales.catalogos.filter(c => c.familiaId == familia).length + 1
            });

            renderizarCatalogos();
            actualizarStats();
            alert('✓ Catálogo agregado exitosamente');
        }

        // Descargar backup
        function descargarBackup() {
            const fecha = new Date().toISOString().split('T')[0];
            const nombre = `backup-catalogos-${fecha}.json`;
            const contenido = JSON.stringify(datosGlobales, null, 2);
            const blob = new Blob([contenido], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombre;
            a.click();
        }

        // Filtrar catálogos
        function filtrarCatalogos() {
            renderizarCatalogos();
        }

        // Actualizar estadísticas
        function actualizarStats() {
            const totalFamilias = datosGlobales.familias.length;
            const familiasActivas = datosGlobales.familias.filter(f => f.activo).length;
            const totalCatalogos = datosGlobales.catalogos.length;
            const catalogosActivos = datosGlobales.catalogos.filter(c => c.activo).length;

            document.getElementById('totalFamilias').textContent = totalFamilias;
            document.getElementById('familiasActivas').textContent = familiasActivas;
            document.getElementById('totalCatalogos').textContent = totalCatalogos;
            document.getElementById('catalogosActivos').textContent = catalogosActivos;
        }
    </script>
</body>
</html>
